<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C.A.S. SYSTEM PRO | Login</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background-color: #1e293b;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }
        h1 { color: #3b82f6; margin-bottom: 24px; }
        input {
            width: 80%;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 8px;
            border: 1px solid #334155;
            background-color: #0f172a;
            color: white;
            font-size: 18px;
            text-align: center;
        }
        button {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: background 0.3s;
        }
        button:hover { background-color: #2563eb; }
        .footer { margin-top: 20px; font-size: 12px; color: #64748b; }
    </style>
</head>
<body>

    <div class="login-card">
        <h1>C.A.S. SYSTEM</h1>
        <p>Inserisci il tuo PIN di accesso</p>
        <input type="password" id="pinInput" placeholder="PIN" maxlength="8">
        <br>
        <button onclick="verificaPin()">ACCEDI</button>
        <div class="footer">Sistema di Gestione Cloud Pro © 2026</div>
    </div>

    <script>
        async function verificaPin() {
            const pinInserito = document.getElementById("pinInput").value;
            const btn = document.querySelector("button");

            if (!pinInserito) {
                alert("Per favore, inserisci un PIN.");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Verifica...";

            try {
                // Fetch del database con parametro anti-cache (?t=...)
                const timestamp = new Date().getTime();
                const response = await fetch(`database_clienti.json?t=${timestamp}`);
                
                if (!response.ok) {
                    throw new Error("Impossibile caricare il database clienti.");
                }

                const database = await response.json();

                // Controllo se il PIN esiste nel database
                if (database[pinInserito]) {
                    const cliente = database[pinInserito];

                    // 1. Controllo Scadenza
                    const oggi = new Date();
                    const dataScadenza = new Date(cliente.scadenza);

                    if (dataScadenza < oggi) {
                        alert(`Accesso Negato: La licenza per "${cliente.nome}" è scaduta il ${cliente.scadenza}. Contatta l'amministratore.`);
                        btn.disabled = false;
                        btn.innerText = "ACCEDI";
                        return;
                    }

                    // 2. Login effettuato con successo
                    console.log("Accesso autorizzato per:", cliente.nome);
                    
                    // Salviamo i dati del cliente per la pagina successiva
                    localStorage.setItem("clienteLoggato", JSON.stringify({
                        pin: pinInserito,
                        nome: cliente.nome,
                        mac: cliente.mac,
                        ruolo: cliente.ruolo
                    }));

                    // Indirizza alla dashboard (modifica il nome file se necessario)
                    window.location.href = "dashboard.html";

                } else {
                    alert("PIN ERRATO: Credenziali non trovate nel sistema.");
                    btn.disabled = false;
                    btn.innerText = "ACCEDI";
                }

            } catch (error) {
                console.error("Errore critico:", error);
                alert("Errore di sistema: Assicurati che il file database_clienti.json sia presente su GitHub.");
                btn.disabled = false;
                btn.innerText = "ACCEDI";
            }
        }

        // Permette l'invio con il tasto Invio sulla tastiera
        document.getElementById("pinInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                verificaPin();
            }
        });
    </script>
</body>
</html>
