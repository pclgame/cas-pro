<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>C.A.S. SYSTEM PRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; --text: #f8fafc; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; }
        
        /* SCHERMATA LOGIN */
        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; }
        .login-box { background: var(--card); padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-align: center; width: 100%; max-width: 320px; }
        input { width: 100%; padding: 15px; margin: 20px 0; border-radius: 10px; border: 1px solid #334155; background: var(--bg); color: white; text-align: center; font-size: 20px; box-sizing: border-box; }
        .btn-login { width: 100%; padding: 15px; border-radius: 10px; border: none; background: var(--accent); color: white; font-weight: bold; font-size: 16px; cursor: pointer; }

        /* DASHBOARD PRINCIPALE */
        #main-screen { display: none; padding: 20px; }
        header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; }
        
        /* CARD DISPOSITIVO */
        .device-card { background: var(--card); padding: 20px; border-radius: 15px; text-align: center; position: relative; transition: 0.2s; border: 2px solid transparent; user-select: none; }
        .device-card:active { transform: scale(0.95); }
        .status-dot { position: absolute; top: 10px; right: 10px; width: 12px; height: 12px; border-radius: 50%; }
        .online { background: #10b981; box-shadow: 0 0 10px #10b981; }
        .offline { background: #ef4444; }
        .money-val { font-size: 24px; font-weight: bold; color: var(--accent); margin: 10px 0; }
        .mac-sub { font-size: 10px; color: #64748b; font-family: monospace; }

        /* POPUP GESTIONE (VECCHIO STILE IPHONE) */
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; justify-content: center; align-items: center; }
        .popup { background: var(--card); width: 90%; max-width: 400px; border-radius: 20px; padding: 25px; position: relative; }
        .close-pop { position: absolute; top: 15px; right: 20px; font-size: 24px; cursor: pointer; }
        .pop-tool { margin: 20px 0; display: flex; flex-direction: column; gap: 10px; }
        .btn-cmd { padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; color: white; }
        .btn-open { background: var(--accent); }
        .btn-reset { background: #475569; }
    </style>
</head>
<body>

    <!-- SCHERMATA 1: LOGIN -->
    <div id="login-screen">
        <div class="login-box">
            <h2 style="margin:0; color:var(--accent)">C.A.S. PRO</h2>
            <p style="font-size:14px; color:#94a3b8">Inserisci codice cliente</p>
            <input type="password" id="pinInput" placeholder="••••" maxlength="8">
            <button class="btn-login" onclick="checkLogin()">ENTRA</button>
        </div>
    </div>

    <!-- SCHERMATA 2: DASHBOARD -->
    <div id="main-screen">
        <header>
            <div>
                <h2 id="clientName" style="margin:0">Benvenuto</h2>
                <div id="expiryInfo" style="font-size:12px; color:#ef4444"></div>
            </div>
            <button onclick="location.reload()" style="background:none; border:1px solid #334155; color:white; border-radius:5px; padding:5px 10px; font-size:10px">LOGOUT</button>
        </header>

        <div class="grid" id="deviceGrid">
            <!-- Qui compaiono i dispositivi -->
        </div>
        <p style="text-align:center; color:#64748b; font-size:11px; margin-top:30px">Fai doppio clic su un dispositivo per gestire</p>
    </div>

    <!-- POPUP DI GESTIONE -->
    <div id="overlay">
        <div class="popup">
            <span class="close-pop" onclick="closePopup()">&times;</span>
            <h3 id="popTitle" style="margin-top:0">Gestione Modulo</h3>
            <div id="popDetails" style="font-size:13px; color:#94a3b8; margin-bottom:20px"></div>
            
            <div class="pop-tool">
                <button class="btn-cmd btn-open" onclick="sendCommand('open')">APRI PORTA / START</button>
                <button class="btn-cmd btn-reset" onclick="sendCommand('reset')">AZZERA INCASSO</button>
            </div>
            
            <div style="background:var(--bg); padding:15px; border-radius:10px; font-size:12px">
                <strong>Stato Tecnico:</strong><br>
                RSSI: <span id="valRssi">--</span> dBm<br>
                Ultimo segnale: <span id="valTime">--</span>
            </div>
        </div>
    </div>

    <script>
        let currentUser = null;
        let devicesData = {};
        let selectedMac = null;

        // --- 1. LOGICA LOGIN ---
        async function checkLogin() {
            const pin = document.getElementById("pinInput").value;
            try {
                const resp = await fetch(`database_clienti.json?t=${Date.now()}`);
                const db = await resp.json();

                if (db[pin]) {
                    const user = db[pin];
                    const oggi = new Date().toISOString().split('T')[0];

                    if (user.scadenza < oggi) {
                        alert("Accesso negato: Licenza scaduta il " + user.scadenza);
                        return;
                    }

                    currentUser = user;
                    showDashboard();
                } else {
                    alert("Codice cliente errato");
                }
            } catch (e) {
                alert("Errore di connessione al database.");
            }
        }

        function showDashboard() {
            document.getElementById("login-screen").style.display = "none";
            document.getElementById("main-screen").style.display = "block";
            document.getElementById("clientName").innerText = currentUser.nome;
            document.getElementById("expiryInfo").innerText = "Scadenza: " + currentUser.scadenza;
            initMQTT();
        }

        // --- 2. LOGICA MQTT ---
        const mqttOptions = {
            connectTimeout: 4000,
            clientId: 'web_' + Math.random().toString(16).substr(2, 8),
            username: 'admin_cas_system',
            password: 'CAS_gate_2026!#',
            protocol: 'wss'
        };

        const client = mqtt.connect('wss://4c3d155d119d45b48f9a1d88d1963d9a.s1.eu.hivemq.cloud:8884/mqtt', mqttOptions);

        function initMQTT() {
            client.on('connect', () => {
                currentUser.mac.forEach(mac => {
                    client.subscribe(`cas_system/status/${mac.toUpperCase()}`);
                });
            });

            client.on('message', (topic, message) => {
                const data = JSON.parse(message.toString());
                devicesData[data.mac] = { ...data, ts: Date.now() };
                updateGrid();
                if(selectedMac === data.mac) updatePopup(data);
            });
        }

        // --- 3. UI DISPOSITIVI ---
        function updateGrid() {
            const grid = document.getElementById("deviceGrid");
            grid.innerHTML = "";

            currentUser.mac.forEach(mac => {
                const d = devicesData[mac.toUpperCase()];
                const isOnline = d && (Date.now() - d.ts < 25000);
                
                const div = document.createElement("div");
                div.className = "device-card";
                div.ondblclick = () => openPopup(mac.toUpperCase());
                // Supporto per mobile (doppio tocco veloce)
                let lastTap = 0;
                div.onclick = (e) => {
                    let now = Date.now();
                    if((now - lastTap) < 300) openPopup(mac.toUpperCase());
                    lastTap = now;
                }

                div.innerHTML = `
                    <div class="status-dot ${isOnline ? 'online' : 'offline'}"></div>
                    <div style="font-size:12px; color:#94a3b8">DISPOSITIVO</div>
                    <div class="money-val">${d ? d.money.toFixed(2) : '0.00'}€</div>
                    <div class="mac-sub">${mac}</div>
                    <div style="font-size:10px; margin-top:5px">${isOnline ? 'COLLEGATO' : 'OFFLINE'}</div>
                `;
                grid.appendChild(div);
            });
        }

        // --- 4. GESTIONE POPUP ---
        function openPopup(mac) {
            selectedMac = mac;
            document.getElementById("overlay").style.display = "flex";
            document.getElementById("popTitle").innerText = "Gestione " + mac;
            const d = devicesData[mac];
            if(d) updatePopup(d);
        }

        function updatePopup(d) {
            document.getElementById("popDetails").innerText = "Aggiornato: " + new Date(d.ts).toLocaleTimeString();
            document.getElementById("valRssi").innerText = d.rssi;
            document.getElementById("valTime").innerText = new Date(d.ts).toLocaleTimeString();
        }

        function closePopup() {
            document.getElementById("overlay").style.display = "none";
            selectedMac = null;
        }

        function sendCommand(action) {
            if(!selectedMac) return;
            const cmd = { action: action, user: currentUser.nome };
            client.publish(`cas_system/cmd/${selectedMac}`, JSON.stringify(cmd));
            alert("Comando " + action.toUpperCase() + " inviato!");
        }

    </script>
</body>
</html>
