<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>C.A.S. CLOUD GATE V3</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        :root { 
            --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; 
            --green: #10b981; --red: #ef4444; --text: #f8fafc; 
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        
        /* LOGIN */
        #login-screen { text-align: center; }
        .pin-display { font-size: 40px; letter-spacing: 15px; margin-bottom: 30px; color: var(--accent); height: 50px; }
        .keypad { display: grid; grid-template-columns: repeat(3, 80px); gap: 15px; }
        .key { width: 80px; height: 80px; border-radius: 50%; background: var(--card); display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
        .key:active { background: var(--accent); }

        /* DASHBOARD */
        #main-app { display: none; width: 100%; max-width: 500px; padding: 20px; box-sizing: border-box; }
        .header { text-align: center; margin-bottom: 20px; }
        .user-badge { background: var(--accent); padding: 5px 15px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        
        .dev-card { 
            background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 15px;
            display: flex; justify-content: space-between; align-items: center;
            border-left: 5px solid var(--accent); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        .offline { opacity: 0.5; border-left-color: #64748b; }
        .money { font-size: 24px; font-weight: 800; color: var(--green); }
        
        /* MODALE */
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal { background: var(--card); width: 85%; border-radius: 25px; padding: 25px; position: relative; }
        button { border: none; font-weight: bold; border-radius: 12px; padding: 15px; cursor: pointer; width: 100%; margin: 5px 0; font-size: 16px; }
        .btn-start { background: var(--green); color: #000; }
        .btn-stop { background: var(--red); color: #fff; }
        .btn-close { background: #334155; color: white; width: 40px; height: 40px; border-radius: 50%; position: absolute; top: -10px; right: -10px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2 style="color: var(--accent)">C.A.S. SYSTEM</h2>
        <div class="pin-display" id="pin-dots"></div>
        <div class="keypad">
            <div class="key" onclick="pressKey('1')">1</div><div class="key" onclick="pressKey('2')">2</div><div class="key" onclick="pressKey('3')">3</div>
            <div class="key" onclick="pressKey('4')">4</div><div class="key" onclick="pressKey('5')">5</div><div class="key" onclick="pressKey('6')">6</div>
            <div class="key" onclick="pressKey('7')">7</div><div class="key" onclick="pressKey('8')">8</div><div class="key" onclick="pressKey('9')">9</div>
            <div class="key" style="opacity:0"></div><div class="key" onclick="pressKey('0')">0</div>
            <div class="key" onclick="pressKey('C')" style="color:var(--red)">✕</div>
        </div>
    </div>

    <div id="main-app">
        <div class="header">
            <span class="user-badge" id="user-display">CLIENTE</span>
            <div id="status-mqtt" style="font-size: 10px; margin-top: 10px; color: #64748b;">CONNETTENDO...</div>
        </div>
        <div id="device-list"></div>
    </div>

    <div id="overlay" class="overlay">
        <div class="modal">
            <button class="btn-close" onclick="closeModal()">✕</button>
            <h3 id="m-name" style="margin-top:0">Modulo</h3>
            <p id="m-mac" style="font-size:10px; opacity:0.6"></p>
            <button class="btn-start" onclick="sendCmd('REMOTE_START')">AVVIA TEMPO</button>
            <button class="btn-stop" onclick="if(confirm('Stop?')) sendCmd('REMOTE_STOP')">STOP</button>
        </div>
    </div>

    <script>
        /* 
           DATABASE SINCRONIZZATO
           In una configurazione "Simbiotica", questo database dovrebbe essere 
           aggiornato tramite MQTT, ma per ora lo manteniamo come riferimento 
           che combacia con la tua App Python.
        */
        const UTENTI = {
            "9999": { nome: "ADMIN", mac: [] }, // L'admin vede tutto
            "1234": { nome: "BAR CENTRALE", mac: ["A1:B2:C3:D4:E5:F6"], scadenza: "2026-12-31" },
            "5678": { nome: "PIZZERIA DA LUIGI", mac: ["AA:BB:CC:DD:EE:FF"], scadenza: "2026-05-15" }
        };

        let currentPin = "";
        let currentUser = null;
        let devices = {};
        let activeMac = "";

        const client = new Paho.MQTT.Client("4c3d155d119d45b48f9a1d88d1963d9a.s1.eu.hivemq.cloud", 8884, "web_" + Math.random().toString(16).substr(2, 5));

        function pressKey(num) {
            if (num === 'C') currentPin = "";
            else currentPin += num;
            document.getElementById('pin-dots').innerText = "•".repeat(currentPin.length);
            if (currentPin.length === 4) login();
        }

        function login() {
            const user = UTENTI[currentPin];
            if (user) {
                const today = new Date().toISOString().split('T')[0];
                if (currentPin !== "9999" && user.scadenza < today) {
                    alert("CANONE SCADUTO. CONTATTARE ASSISTENZA.");
                    resetLogin();
                    return;
                }
                currentUser = user;
                document.getElementById('login-screen').style.display = "none";
                document.getElementById('main-app').style.display = "block";
                document.getElementById('user-display').innerText = user.nome;
                startMQTT();
            } else {
                alert("PIN ERRATO");
                resetLogin();
            }
        }

        function resetLogin() {
            currentPin = "";
            document.getElementById('pin-dots').innerText = "";
        }

        function startMQTT() {
            client.connect({
                useSSL: true, userName: "admin_cas_system", password: "CAS_gate_2026!#",
                onSuccess: () => {
                    document.getElementById('status-mqtt').innerText = "● CLOUD SINCRONIZZATO";
                    client.subscribe("cas_system/status/#");
                }
            });
        }

        client.onMessageArrived = (msg) => {
            const data = JSON.parse(msg.payloadString);
            // Filtro simbiotico: il cliente vede solo i SUOI mac impostati su Python/Git
            if (currentPin !== "9999" && !currentUser.mac.includes(data.mac)) return;
            
            devices[data.mac] = { data: data, ts: Date.now() };
            render();
        };

        function render() {
            const container = document.getElementById('device-list');
            let html = "";
            Object.keys(devices).forEach(mac => {
                const d = devices[mac].data;
                const isOff = (Date.now() - devices[mac].ts) > 25000;
                html += `
                    <div class="dev-card ${isOff ? 'offline' : ''}" onclick="openModal('${mac}')">
                        <div>
                            <strong>${d.dev.toUpperCase()}</strong><br>
                            <small>${isOff ? 'OFFLINE' : 'ONLINE'}</small>
                        </div>
                        <div class="money">${d.money.toFixed(2)}€</div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function openModal(mac) {
            activeMac = mac;
            document.getElementById('m-name').innerText = devices[mac].data.dev;
            document.getElementById('m-mac').innerText = mac;
            document.getElementById('overlay').style.display = "flex";
        }

        function closeModal() { document.getElementById('overlay').style.display = "none"; }

        function sendCmd(cmd) {
            const m = new Paho.MQTT.Message(JSON.stringify({cmd: cmd}));
            m.destinationName = "cas_system/cmd/" + activeMac;
            client.send(m);
            closeModal();
        }
    </script>
</body>
</html>
