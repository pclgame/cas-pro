<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>C.A.S. SYSTEM PRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; --text: #f8fafc; --online: #10b981; --offline: #ef4444; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        
        /* LOGIN */
        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; box-sizing: border-box; }
        .login-box { background: var(--card); padding: 30px; border-radius: 20px; text-align: center; width: 100%; max-width: 320px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 15px; margin: 20px 0; border-radius: 10px; border: 1px solid #334155; background: var(--bg); color: white; text-align: center; font-size: 20px; }
        .btn-login { width: 100%; padding: 15px; border-radius: 10px; border: none; background: var(--accent); color: white; font-weight: bold; cursor: pointer; }

        /* DASHBOARD */
        #main-screen { display: none; padding: 20px; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; }
        
        /* CARD */
        .device-card { background: var(--card); padding: 20px; border-radius: 15px; text-align: center; position: relative; border: 2px solid transparent; cursor: pointer; transition: 0.2s; }
        .status-dot { position: absolute; top: 12px; right: 12px; width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--card); }
        .online { background: var(--online); box-shadow: 0 0 8px var(--online); }
        .offline { background: var(--offline); }
        .money-val { font-size: 28px; font-weight: bold; color: var(--accent); margin: 10px 0; }
        .mac-label { font-size: 10px; color: #64748b; font-family: monospace; }

        /* POPUP */
        #overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:100; justify-content:center; align-items:center; backdrop-filter: blur(4px); }
        .popup { background: var(--card); width: 85%; max-width: 350px; border-radius: 20px; padding: 25px; position: relative; }
        .btn-cmd { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; font-weight: bold; color: white; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="color:var(--accent)">C.A.S. PRO</h2>
            <input type="password" id="pinInput" placeholder="PIN CLIENTE" maxlength="8">
            <button class="btn-login" onclick="checkLogin()">ACCEDI</button>
        </div>
    </div>

    <div id="main-screen">
        <header>
            <div>
                <h2 id="clientName" style="margin:0">---</h2>
                <div id="expiryInfo" style="font-size:12px">---</div>
            </div>
            <button onclick="location.reload()" style="background:#334155; color:white; border:none; padding:8px 12px; border-radius:5px">ESCI</button>
        </header>
        <div class="grid" id="deviceGrid"></div>
    </div>

    <div id="overlay">
        <div class="popup">
            <h3 id="popTitle" style="margin-top:0">Gestione</h3>
            <p id="popStatus" style="font-size:13px; color:#94a3b8"></p>
            <button class="btn-cmd" style="background:var(--accent)" onclick="sendCmd('REMOTE_START')">APRI / START</button>
            <button class="btn-cmd" style="background:#475569" onclick="sendCmd('RESET_TOTAL')">AZZERA INCASSO</button>
            <button class="btn-cmd" style="background:#dc3545" onclick="sendCmd('REMOTE_STOP')">STOP EMERGENZA</button>
            <button onclick="closePop()" style="background:none; border:none; color:#64748b; width:100%; margin-top:10px">Chiudi</button>
        </div>
    </div>

    <script>
        let currentUser = null;
        let devices = {};
        let selectedMac = null;

        // Configurazione MQTT
        const mqttClient = mqtt.connect('wss://4c3d155d119d45b48f9a1d88d1963d9a.s1.eu.hivemq.cloud:8884/mqtt', {
            username: 'admin_cas_system',
            password: 'CAS_gate_2026!#',
            clientId: 'WEB_' + Math.random().toString(16).substr(2, 5)
        });

        async function checkLogin() {
            const pin = document.getElementById("pinInput").value;
            try {
                const r = await fetch(`database_clienti.json?v=${Date.now()}`);
                const db = await r.json();
                if (db[pin]) {
                    currentUser = db[pin];
                    startApp();
                } else { alert("PIN errato"); }
            } catch(e) { alert("Errore database"); }
        }

        function startApp() {
            document.getElementById("login-screen").style.display = "none";
            document.getElementById("main-screen").style.display = "block";
            document.getElementById("clientName").innerText = currentUser.nome;
            document.getElementById("expiryInfo").innerText = "Scadenza: " + currentUser.scadenza;
            
            // Sottoscrizione immediata ai topic corretti
            currentUser.mac.forEach(m => {
                const cleanMac = m.trim().toUpperCase();
                mqttClient.subscribe(`cas_system/status/${cleanMac}`);
                console.log("In ascolto su:", cleanMac);
            });
            
            renderGrid();
        }

        mqttClient.on('message', (topic, msg) => {
            try {
                const data = JSON.parse(msg.toString());
                const m = data.mac.toUpperCase();
                devices[m] = { ...data, lastSeen: Date.now() };
                renderGrid();
                if(selectedMac === m) {
                    document.getElementById("popStatus").innerText = "Segnale: " + data.rssi + " dBm | Online";
                }
            } catch(e) { console.error("JSON Error"); }
        });

        function renderGrid() {
            const container = document.getElementById("deviceGrid");
            container.innerHTML = "";
            
            currentUser.mac.forEach(m => {
                const mac = m.trim().toUpperCase();
                const d = devices[mac];
                const isOnline = d && (Date.now() - d.lastSeen < 15000); // 15 secondi timeout
                
                const card = document.createElement("div");
                card.className = "device-card";
                
                // Gestione click per iPhone
                let lastTap = 0;
                card.addEventListener('touchend', (e) => {
                    let now = Date.now();
                    if(now - lastTap < 300) openPop(mac);
                    lastTap = now;
                });
                card.onclick = () => { openPop(mac); };

                card.innerHTML = `
                    <div class="status-dot ${isOnline ? 'online' : 'offline'}"></div>
                    <div style="font-size:11px; opacity:0.7">MODULO</div>
                    <div class="money-val">${d ? d.money.toFixed(2) : '0.00'}€</div>
                    <div class="mac-label">${mac}</div>
                    <div style="font-size:10px; margin-top:10px; color:${isOnline ? '#10b981' : '#64748b'}">
                        ${isOnline ? 'CONNESSO' : 'NON RAGGIUNGIBILE'}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function openPop(mac) {
            selectedMac = mac;
            document.getElementById("popTitle").innerText = "MODULO " + mac;
            document.getElementById("overlay").style.display = "flex";
        }

        function closePop() { document.getElementById("overlay").style.display = "none"; }

        function sendCmd(cmd) {
            if(!selectedMac) return;
            const topic = `cas_system/cmd/${selectedMac}`;
            // Il tuo ESP si aspetta {"cmd": "NOME_COMANDO"}
            const payload = JSON.stringify({ cmd: cmd });
            mqttClient.publish(topic, payload);
            alert("Comando inviato!");
            closePop();
        }
    </script>
</body>
</html>
