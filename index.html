<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>C.A.S. ADMIN PANEL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        :root { 
            --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; 
            --green: #10b981; --red: #ef4444; --yellow: #f59e0b; --text: #f8fafc; 
        }
        
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: env(safe-area-inset-top) 15px 20px 15px; }
        
        /* Header */
        .header { text-align: center; padding: 20px 0; }
        .header h2 { margin: 0; font-size: 22px; letter-spacing: 1px; color: var(--accent); }
        #status-bar { font-size: 11px; font-weight: bold; margin-top: 5px; padding: 4px 12px; border-radius: 20px; display: inline-block; background: #334155; }
        .status-online { color: var(--green); }
        .status-offline { color: var(--red); }

        /* Griglia Dispositivi */
        #device-list { display: grid; gap: 15px; margin-top: 10px; }

        .dev-card { 
            background: var(--card); border-radius: 20px; padding: 20px;
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid rgba(255,255,255,0.05); transition: 0.3s;
            position: relative; overflow: hidden;
        }
        
        /* Indicatore Online/Offline laterale */
        .dev-card::before {
            content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 6px; background: var(--accent);
        }

        .offline { opacity: 0.8; filter: grayscale(0.5); }
        .offline::before { background: #64748b !important; }
        
        .info-left h3 { margin: 0; font-size: 18px; color: var(--text); }
        .info-left small { font-family: monospace; color: #94a3b8; font-size: 11px; }
        .time-badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: rgba(0,0,0,0.3); margin-top: 5px; display: inline-block; }

        .data-right { text-align: right; }
        .money { font-size: 22px; font-weight: 800; color: var(--green); }
        .timer-active { color: var(--yellow); font-weight: bold; font-size: 14px; }

        /* Modale */
        .overlay { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); 
            z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(10px);
        }
        .modal { 
            background: var(--card); width: 92%; max-height: 85vh; border-radius: 30px;
            padding: 25px; box-sizing: border-box; overflow-y: auto; position: relative;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        .wifi-box { background: rgba(59, 130, 246, 0.1); border: 1px solid var(--accent); border-radius: 15px; padding: 15px; margin: 15px 0; text-align: left; }
        .wifi-box code { color: var(--accent); font-weight: bold; }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        
        label { display: block; text-align: left; font-size: 11px; text-transform: uppercase; color: #94a3b8; margin-bottom: 5px; margin-top: 15px; }
        input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #334155; background: #0f172a; color: white; font-size: 16px; box-sizing: border-box; }
        
        button { border: none; font-weight: bold; border-radius: 15px; cursor: pointer; transition: active 0.1s; }
        button:active { transform: scale(0.97); }
        
        .btn-start { background: var(--green); color: #064e3b; padding: 18px; }
        .btn-stop { background: var(--red); color: white; padding: 18px; }
        .btn-save { background: var(--accent); color: white; padding: 15px; width: 100%; margin-top: 10px; }
        .btn-reset { background: #475569; color: #cbd5e1; padding: 10px; font-size: 12px; margin-top: 20px; }
        .btn-close { position: absolute; top: 15px; right: 15px; background: #334155; color: white; width: 30px; height: 30px; border-radius: 50%; font-size: 12px; }

    </style>
</head>
<body>

    <div class="header">
        <h2>C.A.S. SYSTEM 2026</h2>
        <div id="status-bar">CONNESSIONE...</div>
    </div>

    <div id="device-list">
        <!-- I dispositivi appariranno qui -->
    </div>

    <!-- Modal Dettagli -->
    <div id="overlay" class="overlay">
        <div class="modal">
            <button class="btn-close" onclick="closeModal()">✕</button>
            <h3 id="m-name" style="margin:0">Modulo</h3>
            <p id="m-mac" style="font-size:11px; opacity:0.5; margin-bottom:20px"></p>
            
            <div class="wifi-box">
                <span style="font-size:12px; display:block; margin-bottom:5px">📡 PARAMETRI RETE:</span>
                SSID: <code id="m-ssid">-</code><br>
                PASS: <code id="m-pass">-</code>
            </div>

            <label>Comandi Rapidi</label>
            <div class="btn-group">
                <button class="btn-start" onclick="sendCmd('REMOTE_START', false)">+ 1 START</button>
                <button class="btn-stop" onclick="if(confirm('Fermare?')) sendCmd('REMOTE_STOP', false)">STOP</button>
            </div>

            <label>Impostazioni Modulo</label>
            <input type="number" id="in-sec" placeholder="Secondi x Impulso">
            <input type="number" id="in-min" placeholder="Impulsi Minimi">
            <input type="number" id="in-val" step="0.01" placeholder="Valore €">

            <button class="btn-save" onclick="saveConfig()">AGGIORNA CONFIGURAZIONE</button>
            <button class="btn-reset" onclick="resetMoney()">AZZERA INCASSO TOTALIZZATORE</button>
        </div>
    </div>

    <script>
        const MQTT_CONFIG = {
            host: "4c3d155d119d45b48f9a1d88d1963d9a.s1.eu.hivemq.cloud",
            port: 8884,
            user: "admin_cas_system",
            pass: "CAS_gate_2026!#",
            clientId: "admin_web_" + Math.random().toString(16).substr(2, 5)
        };

        let devices = {};
        let currentMac = "";

        const client = new Paho.MQTT.Client(MQTT_CONFIG.host, MQTT_CONFIG.port, MQTT_CONFIG.clientId);

        client.onMessageArrived = (message) => {
            try {
                const data = JSON.parse(message.payloadString);
                devices[data.mac] = { data: data, lastSeen: Date.now() };
                renderList();
            } catch (e) {}
        };

        client.onConnectionLost = () => {
            updateStatus("OFFLINE / RICONNESSIONE", "status-offline");
            setTimeout(connectMQTT, 3000);
        };

        function connectMQTT() {
            client.connect({
                useSSL: true, userName: MQTT_CONFIG.user, password: MQTT_CONFIG.pass,
                onSuccess: () => {
                    updateStatus("● CLOUD ACTIVE", "status-online");
                    client.subscribe("cas_system/status/#");
                },
                onFailure: () => { updateStatus("ERRORE CLOUD", "status-offline"); setTimeout(connectMQTT, 5000); }
            });
        }

        function updateStatus(txt, cls) {
            const el = document.getElementById('status-bar');
            el.innerText = txt;
            el.className = cls;
        }

        function renderList() {
            const listDiv = document.getElementById('device-list');
            const now = Date.now();
            
            // Ordiniamo per nome
            const sortedMacs = Object.keys(devices).sort((a, b) => 
                devices[a].data.dev.localeCompare(devices[b].data.dev));

            let html = "";
            sortedMacs.forEach(mac => {
                const d = devices[mac].data;
                const diffSec = Math.floor((now - devices[mac].lastSeen) / 1000);
                const isOffline = diffSec > 30; // Considerato offline dopo 30 secondi
                
                let timeStatus = isOffline ? 
                    `<span class="time-badge" style="color:#ef4444">Offline da ${formatTime(diffSec)}</span>` : 
                    `<span class="time-badge" style="color:#10b981">In linea ora</span>`;

                html += `
                    <div class="dev-card ${isOffline ? 'offline' : ''}" onclick="openModal('${mac}')">
                        <div class="info-left">
                            <h3>${d.dev.toUpperCase()}</h3>
                            <small>${mac}</small><br>
                            ${timeStatus}
                        </div>
                        <div class="data-right">
                            <div class="money">${d.money.toFixed(2)}€</div>
                            <div class="timer-active">${Math.round(d.sec)}s residui</div>
                        </div>
                    </div>
                `;
            });
            listDiv.innerHTML = html;
        }

        function formatTime(s) {
            if (s < 60) return s + "s";
            if (s < 3600) return Math.floor(s/60) + "m";
            return Math.floor(s/3600) + "h";
        }

        function openModal(mac) {
            currentMac = mac;
            const d = devices[mac].data;
            document.getElementById('m-name').innerText = d.dev;
            document.getElementById('m-mac').innerText = "MAC: " + mac;
            document.getElementById('m-ssid').innerText = d.wifi_ssid || "N/A";
            document.getElementById('m-pass').innerText = d.wifi_pass || "N/A";
            document.getElementById('in-sec').value = d.sec_p;
            document.getElementById('in-min').value = d.min_i;
            document.getElementById('in-val').value = d.c_val;
            document.getElementById('overlay').style.display = "flex";
        }

        function closeModal() { document.getElementById('overlay').style.display = "none"; }

        function sendCmd(payload, retain) {
            const msgBody = typeof payload === 'object' ? payload : { cmd: payload };
            const message = new Paho.MQTT.Message(JSON.stringify(msgBody));
            message.destinationName = `cas_system/cmd/${currentMac}`;
            message.retained = retain;
            client.send(message);
            if (!retain) {
                const btn = event.target;
                const oldTxt = btn.innerText;
                btn.innerText = "INVIATO!";
                setTimeout(() => btn.innerText = oldTxt, 1000);
            }
        }

        function saveConfig() {
            const config = {
                sec_p: parseInt(document.getElementById('in-sec').value),
                min_i: parseInt(document.getElementById('in-min').value),
                c_val: parseFloat(document.getElementById('in-val').value)
            };
            sendCmd(config, true);
            alert("Configurazione salvata nel Cloud");
            closeModal();
        }

        function resetMoney() {
            if(confirm("Questa azione azzererà i soldi accumulati su questo dispositivo. Continuare?")) {
                sendCmd("RESET_TOTAL", true);
                closeModal();
            }
        }

        connectMQTT();
        setInterval(renderList, 1000); // Aggiorna i timer ogni secondo
    </script>
</body>
</html>
